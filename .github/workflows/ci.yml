name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: node --import tsx --test tests/*.test.ts
        env:
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test